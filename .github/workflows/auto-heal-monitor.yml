name: Auto-Heal — Post-Merge Monitor

on:
  schedule:
    # Hourly. Detection is GH API-polled (one call per open auto-heal PR).
    # Assessment is a single SQL query per active watch. Runs cheaply even
    # when nothing is happening.
    - cron: "17 * * * *"
  workflow_dispatch:

concurrency:
  group: auto-heal-monitor
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run:
    name: POST /api/v1/cron/auto-heal-monitor
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call monitor endpoint
        env:
          APP_URL: ${{ secrets.CHAT_QUALITY_BASE_URL }}
          CRON_SECRET: ${{ secrets.CHAT_QUALITY_CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${APP_URL:-}" ] || [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::CHAT_QUALITY_BASE_URL and CHAT_QUALITY_CRON_SECRET must be set as repo secrets"
            exit 1
          fi

          RESPONSE=$(mktemp)
          STATUS=$(curl -sS -o "$RESPONSE" -w "%{http_code}" \
            -X POST "$APP_URL/api/v1/cron/auto-heal-monitor" \
            -H "X-Cron-Secret: $CRON_SECRET" \
            -H "Content-Type: application/json" \
            --max-time 240)

          echo "HTTP $STATUS"
          echo "--- response body ---"
          cat "$RESPONSE"
          echo
          echo "---------------------"

          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 300 ]; then
            echo "::error::auto-heal-monitor returned HTTP $STATUS"
            exit 1
          fi
