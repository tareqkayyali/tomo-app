name: Auto-Heal — Apply Proposed Fixes

on:
  schedule:
    # Every 30 minutes. The applier is kill-switch gated (enabled=false by
    # default) so scheduled fires are no-ops until you flip the flag. The
    # 30-minute cadence amortises GH API cost against the per-file-per-week
    # rate limit already enforced inside runApplierOnce().
    - cron: "*/30 * * * *"
  workflow_dispatch:

concurrency:
  group: auto-heal-apply
  cancel-in-progress: false

jobs:
  run:
    name: POST /api/v1/cron/auto-heal-apply
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Call applier endpoint
        env:
          APP_URL: ${{ secrets.CHAT_QUALITY_BASE_URL }}
          CRON_SECRET: ${{ secrets.CHAT_QUALITY_CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${APP_URL:-}" ] || [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::CHAT_QUALITY_BASE_URL and CHAT_QUALITY_CRON_SECRET must be set as repo secrets"
            exit 1
          fi

          RESPONSE=$(mktemp)
          STATUS=$(curl -sS -o "$RESPONSE" -w "%{http_code}" \
            -X POST "$APP_URL/api/v1/cron/auto-heal-apply" \
            -H "X-Cron-Secret: $CRON_SECRET" \
            -H "Content-Type: application/json" \
            --max-time 540)

          echo "HTTP $STATUS"
          echo "--- response body ---"
          cat "$RESPONSE"
          echo
          echo "---------------------"

          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 300 ]; then
            echo "::error::auto-heal-apply returned HTTP $STATUS"
            exit 1
          fi
