name: Chat Quality — Auto-Repair Scan

on:
  schedule:
    # Every 6 hours (00:15, 06:15, 12:15, 18:15 UTC). 15min offset from top
    # of hour to avoid piling onto scheduler traffic peaks.
    - cron: "15 */6 * * *"
  workflow_dispatch:

concurrency:
  group: chat-quality-auto-repair
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run:
    name: POST /api/v1/cron/auto-repair-scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call auto-repair-scan endpoint
        env:
          APP_URL: ${{ secrets.CHAT_QUALITY_BASE_URL }}
          CRON_SECRET: ${{ secrets.CHAT_QUALITY_CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${APP_URL:-}" ] || [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::CHAT_QUALITY_BASE_URL and CHAT_QUALITY_CRON_SECRET must be set as repo secrets"
            exit 1
          fi

          RESPONSE=$(mktemp)
          STATUS=$(curl -sS -o "$RESPONSE" -w "%{http_code}" \
            -X POST "$APP_URL/api/v1/cron/auto-repair-scan" \
            -H "X-Cron-Secret: $CRON_SECRET" \
            -H "Content-Type: application/json" \
            --max-time 240)

          echo "HTTP $STATUS"
          echo "--- response body ---"
          cat "$RESPONSE"
          echo
          echo "---------------------"

          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 300 ]; then
            echo "::error::auto-repair-scan returned HTTP $STATUS"
            exit 1
          fi
