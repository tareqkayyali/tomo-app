name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            mobile/package-lock.json

      - name: Install backend deps
        run: cd backend && npm ci

      - name: Type check backend
        run: cd backend && npx tsc --noEmit

      - name: Install mobile deps
        run: cd mobile && npm ci

      - name: Type check mobile
        run: cd mobile && npx tsc --noEmit

  # ── ALL DEPLOYS ARE MANUAL ──
  # Vercel CLI in CI deploys to wrong projects (even with .vercel/project.json),
  # causing 404s on app.my-tomo.com. Deploy both backend and frontend locally.
  #
  # Backend:  cd backend && npx vercel --prod --yes --scope tareqkayyalis-projects
  # Frontend: cd mobile && npx expo export --platform web
  #           mkdir -p dist/.vercel && echo '{"projectId":"prj_q1uTcXazyBCVTQRkJNQxblofVkNQ","orgId":"team_O05XelWPyLJ2yHVFmmzjYqjc"}' > dist/.vercel/project.json
  #           cd dist && npx vercel --prod --yes --scope tareqkayyalis-projects
