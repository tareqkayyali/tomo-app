name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Detect which directories changed ──────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      mobile: ${{ steps.filter.outputs.mobile }}
      ai-service: ${{ steps.filter.outputs.ai-service }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            mobile:
              - 'mobile/**'
            ai-service:
              - 'ai-service/**'

  # ── Backend typecheck — only when backend/ files change ───────────────────
  typecheck-backend:
    name: Type Check Backend
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend deps
        run: cd backend && npm ci

      - name: Type check backend
        run: cd backend && npx tsc --noEmit

      - name: Admin routes integrity — every sidebar href resolves to a page.tsx
        run: cd backend && npm run check:admin-routes

  # ── Mobile typecheck — only when mobile/ files change ─────────────────────
  typecheck-mobile:
    name: Type Check Mobile
    needs: changes
    if: needs.changes.outputs.mobile == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install mobile deps
        run: cd mobile && npm ci

      - name: Type check mobile
        run: cd mobile && npx tsc --noEmit

  # ── Meta-eval scoring — only when ai-service/ files change ────────────────
  # Guards the eval harness scorer itself against regressions. The scorer had
  # a 73% false-negative rate in April 2026 (commit c3763e6) that masked
  # real safety failures. These 29 cases lock in the fix. If safety ever
  # drops below 100%, check the harness before blaming the pipeline.
  meta-eval-scoring:
    name: Meta-Eval Scoring Tests
    needs: changes
    if: needs.changes.outputs.ai-service == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            ai-service/requirements.txt
            ai-service/requirements-test.txt

      - name: Install deps
        working-directory: ai-service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-test.txt

      - name: Run scoring tests
        working-directory: ai-service
        run: pytest tests/test_eval_scoring.py -v --tb=short

  # ── Live routing eval (Phase 1) — INFORMATIONAL, NOT REQUIRED FOR MERGE ──
  # Runs the real Sonnet classifier against 30 routing scenarios and persists
  # results to ai_eval_runs + ai_eval_results. Current classifier scores ~63%
  # against the 90% target; promoting this job to ci-ok.needs would block
  # every ai-service PR. Keep informational until the classifier consistently
  # passes 90%, then add `routing-live-eval` to ci-ok's needs and drop the
  # `continue-on-error` hint here.
  #
  # Cost: ~$0.006 per PR (30 scenarios × claude-sonnet-4-6).
  # Concurrency: only one run per branch at a time to respect API rate limits.
  routing-live-eval:
    name: Live Routing Eval (informational)
    needs: changes
    if: needs.changes.outputs.ai-service == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: routing-live-eval-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            ai-service/requirements.txt
            ai-service/requirements-test.txt

      - name: Install deps
        working-directory: ai-service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-test.txt

      - name: Run routing_live against Sonnet classifier
        working-directory: ai-service
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python -m evals.runner --suite routing_live --persist --trigger pr

  # ── Always-pass job for branch protection ─────────────────────────────────
  # Railway and GitHub branch protection need a required check that always
  # reports success. This job passes instantly when no relevant files changed,
  # so Railway doesn't wait for skipped checks.
  ci-ok:
    name: CI OK
    runs-on: ubuntu-latest
    needs: [changes, typecheck-backend, typecheck-mobile, meta-eval-scoring]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.typecheck-backend.result }}" == "failure" ]] || \
             [[ "${{ needs.typecheck-mobile.result }}" == "failure" ]] || \
             [[ "${{ needs.meta-eval-scoring.result }}" == "failure" ]]; then
            echo "Type check or meta-eval failed"
            exit 1
          fi
          echo "All checks passed (or skipped — no relevant changes)"
