name: Chat Quality — Shadow / Canary Evaluate

on:
  schedule:
    # Every 15 minutes. The evaluator is cheap when no runs are active — it
    # just returns {runsEvaluated: 0}. When runs are active, tighter cadence
    # shortens time-to-decision.
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: chat-quality-shadow-evaluate
  cancel-in-progress: true

jobs:
  run:
    name: POST /api/v1/cron/shadow-evaluate
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Call shadow-evaluate endpoint
        env:
          APP_URL: ${{ secrets.CHAT_QUALITY_BASE_URL }}
          CRON_SECRET: ${{ secrets.CHAT_QUALITY_CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${APP_URL:-}" ] || [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::CHAT_QUALITY_BASE_URL and CHAT_QUALITY_CRON_SECRET must be set as repo secrets"
            exit 1
          fi

          RESPONSE=$(mktemp)
          STATUS=$(curl -sS -o "$RESPONSE" -w "%{http_code}" \
            -X POST "$APP_URL/api/v1/cron/shadow-evaluate" \
            -H "X-Cron-Secret: $CRON_SECRET" \
            -H "Content-Type: application/json" \
            --max-time 120)

          echo "HTTP $STATUS"
          echo "--- response body ---"
          cat "$RESPONSE"
          echo
          echo "---------------------"

          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 300 ]; then
            echo "::error::shadow-evaluate returned HTTP $STATUS"
            exit 1
          fi
