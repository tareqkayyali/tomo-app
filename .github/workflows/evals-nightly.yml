name: Evals — Nightly Full Suite

on:
  schedule:
    # 04:00 UTC daily. One hour after CQE drift-check (03:00) so API
    # traffic is staggered and any drift-check-related telemetry has
    # settled before the eval run reads from ai_eval_runs history.
    - cron: "0 4 * * *"
  workflow_dispatch:

concurrency:
  group: evals-nightly
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run:
    name: Full suite (routing_live, safety, card_validation, routing_dataset_shape)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # NOTE: Exit code reflects aggregate threshold pass/fail. The routing_live
    # classifier currently scores ~63% against a 90% threshold, so the nightly
    # is EXPECTED to report failure until the classifier improves. The
    # ai_eval_runs row gets status='failed' in that case — and the baseline
    # rollover cron (Phase 2 Commit 11) only promotes after 3 consecutive
    # status='passed' nights, so a broken classifier correctly gates the
    # rolling baseline.
    #
    # DO NOT add this job to a required branch-protection check — it's
    # informational telemetry, not a gate.
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            ai-service/requirements.txt
            ai-service/requirements-test.txt

      - name: Install deps
        working-directory: ai-service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-test.txt

      - name: Run full eval suite
        working-directory: ai-service
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        # --persist-required: fail the run if Supabase write fails. Nightly
        # data trail is the input to baseline rollover — missing rows would
        # delay the rolling anchor advance, which is a real bug to surface.
        # No --halt: every suite runs even if an earlier one fails, so we
        # get full telemetry per night.
        run: |
          python -m evals.runner \
            --suite all \
            --persist \
            --persist-required \
            --trigger nightly \
            --report

      - name: Upload markdown report
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: eval-report-${{ github.run_id }}
          path: ai-service/evals/reports/*.md
          retention-days: 30
          if-no-files-found: warn
