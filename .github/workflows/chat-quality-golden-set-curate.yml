name: Chat Quality — Golden-Set Curate

on:
  schedule:
    # Sundays at 04:00 UTC — weekly rotation of the golden test set.
    - cron: "0 4 * * 0"
  workflow_dispatch:

concurrency:
  group: chat-quality-golden-set
  cancel-in-progress: false

jobs:
  run:
    name: POST /api/v1/cron/golden-set-curate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Call golden-set-curate endpoint
        env:
          APP_URL: ${{ secrets.CHAT_QUALITY_BASE_URL }}
          CRON_SECRET: ${{ secrets.CHAT_QUALITY_CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${APP_URL:-}" ] || [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::CHAT_QUALITY_BASE_URL and CHAT_QUALITY_CRON_SECRET must be set as repo secrets"
            exit 1
          fi

          RESPONSE=$(mktemp)
          STATUS=$(curl -sS -o "$RESPONSE" -w "%{http_code}" \
            -X POST "$APP_URL/api/v1/cron/golden-set-curate" \
            -H "X-Cron-Secret: $CRON_SECRET" \
            -H "Content-Type: application/json" \
            --max-time 480)

          echo "HTTP $STATUS"
          echo "--- response body ---"
          cat "$RESPONSE"
          echo
          echo "---------------------"

          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 300 ]; then
            echo "::error::golden-set-curate returned HTTP $STATUS"
            exit 1
          fi
